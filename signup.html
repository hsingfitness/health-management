<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Create your Health Management account to save your health history, track progress, and get personalized AI insights.">

<meta name="author" content="Health Management">

<title>Sign Up | Health Management</title>

<link rel="icon" href="favicon.ico">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header>

    <div class="container nav-container">

        <a href="index.html" class="brand">

            <span class="brand-logo">

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">

                    <path
                        d="M2 12h5l2-6 4 12 2-6h7"
                        stroke="#10A386"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>

                </svg>

            </span>

            <span class="brand-name">

                Health Management

            </span>

        </a>

        <div class="nav-right">

            <nav>

                <ul>

                    <li><a href="index.html" data-i18n="nav.home">Home</a></li>

                    <li><a href="assessment.html" data-i18n="nav.assessment">Assessment</a></li>

                    <li><a href="marketplace.html" data-i18n="nav.marketplace">Marketplace</a></li>

                    <li class="dropdown">

                        <a href="#" data-i18n="nav.fitness">Fitness</a>

                        <div class="dropdown-menu">

                            <a href="fitness/strength.html" data-i18n="nav.strength">Strength</a>

                            <a href="fitness/control.html" data-i18n="nav.control">Control</a>

                            <a href="fitness/power.html" data-i18n="nav.power">Power</a>

                        </div>

                    </li>

                    <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>

                </ul>

            </nav>

            <div class="nav-actions">

                <a href="marketplace.html" class="btn-cart" aria-label="Shopping cart">

                    <span aria-hidden="true">🛒</span>

                </a>

                <span id="nav-auth-slot">
                <a href="login.html" class="btn-login">

                    Log In

                </a>
                </span>

                <div class="language-dropdown">

                    <button class="btn-language">

                        🌐 EN

                    </button>

                    <div class="language-menu">

                        <a href="#">🇺🇸 English</a>

                        <a href="#">🇨🇳 中文</a>

                        <a href="#">🇯🇵 日本語</a>

                        <a href="#">🇰🇷 한국어</a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</header>

<main>

<section class="login-hero login-hero--centered">

<div class="container login-grid login-grid--single">

<div class="login-panel" aria-label="Sign up">

<form class="login-form" id="signup-form" novalidate>

<h2>Create Account</h2>

<p class="form-error" hidden></p>

<label for="name">Full name</label>
<input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required>

<label for="email">Email address</label>
<input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email" required>

<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>

<label for="confirm">Confirm password</label>
<input type="password" id="confirm" name="confirm" placeholder="Re-enter your password" autocomplete="new-password" minlength="8" required>

<button type="submit" class="button button-primary">Sign Up</button>

<p class="login-note">
Already have an account? <a href="login.html">Log In</a>
</p>

</form>

</div>

</div>

</section>

</main>

<script src="js/stripe-links.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n/translations.js"></script>
<script src="js/i18n.js"></script>

<script src="js/main.js"></script>

</body>

</html>
